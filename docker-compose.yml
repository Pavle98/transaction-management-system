services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - csv.file.path=/data/transactions.csv
      - cors.allowed-origin=http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
